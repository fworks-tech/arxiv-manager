<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ArXiv Manager{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#1a1a2e', hover: '#16213e' },
                    }
                }
            }
        }
    </script>
    <style>
        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }
        .spinner { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen">
    <nav class="bg-[#1a1a2e] text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="flex items-center justify-between h-14 sm:h-16">
                <a href="/" class="text-lg font-bold tracking-tight">ArXiv Manager</a>
                <button id="nav-toggle" class="lg:hidden p-2 rounded-lg hover:bg-white/10" aria-label="Toggle navigation">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <div id="nav-links" class="hidden lg:flex items-center gap-1">
                    <a href="/" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors">Dashboard</a>
                    <a href="/author" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors">Author</a>
                    <a href="/images" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors">Images</a>
                    <a href="/tasks" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors">Tasks</a>
                    <a href="/stats" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors">Stats</a>
                    <a href="/metrics" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors">Metrics</a>
                </div>
            </div>
            <div id="mobile-nav" class="hidden lg:hidden pb-3 space-y-1">
                <a href="/" class="block px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors">Dashboard</a>
                <a href="/author" class="block px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors">Author</a>
                <a href="/images" class="block px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors">Images</a>
                <a href="/tasks" class="block px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors">Tasks</a>
                <a href="/stats" class="block px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors">Stats</a>
                <a href="/metrics" class="block px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors">Metrics</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

    <script>
        // Mobile nav toggle
        document.getElementById('nav-toggle')?.addEventListener('click', function() {
            var el = document.getElementById('mobile-nav');
            el.classList.toggle('hidden');
        });

        // Toast helper
        function showToast(msg, type) {
            type = type || 'success';
            var colors = {success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600'};
            var t = document.createElement('div');
            t.className = (colors[type] || 'bg-gray-700') + ' text-white px-4 py-3 rounded-lg shadow-lg text-sm font-medium animate-bounce-in';
            t.textContent = msg;
            var c = document.getElementById('toast-container');
            c.appendChild(t);
            setTimeout(function() { t.remove(); }, 3000);
        }

        // HTMX error handler
        document.addEventListener('htmx:responseError', function(evt) {
            showToast('Request failed: ' + (evt.detail.xhr.statusText || 'Unknown error'), 'error');
        });
        document.addEventListener('htmx:sendError', function(evt) {
            showToast('Network error — check your connection', 'error');
        });
    </script>
</body>
</html>
